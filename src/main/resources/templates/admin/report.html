<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/image/logo/favicon-v5.png">
    <title>신고 관리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/clay.css">
</head>
<body>
<div th:include="/admin/adminNav.html"></div>
<div class="container section">
    <div class="stack-lg">
        <div class="stack-sm">
            <p class="eyebrow">🚨 genie 관리자</p>
            <h1 class="display-sm">신고 내역</h1>
            <p class="muted body-md">접수된 신고 목록입니다. 번호를 눌러 상세 내용을 확인하세요.</p>
        </div>
        <div class="card card--cream card--pad-xl">
            <table class="clay-table">
                <thead>
                <tr>
                    <th scope="col">신고번호</th><th scope="col">내용</th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="report: ${reportList}">
                    <tr>
                        <th scope="row"><a class="link" th:href="@{/report/{reportId}(reportId = ${report.reportId})}">#[[${report.reportId}]]</a></th>
                        <td th:text="${report.contents}"/>
                    </tr>
                </th:block>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
