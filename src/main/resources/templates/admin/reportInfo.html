<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/image/logo/favicon-v5.png">
    <title>신고 상세</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/clay.css">
</head>
<body>
<div th:include="/admin/adminNav.html"></div>
<div class="container section">
    <div class="stack-lg" style="max-width:640px;margin:0 auto;">
        <div class="stack-sm">
            <p class="eyebrow">🚨 genie 관리자</p>
            <h1 class="display-sm">신고 내역</h1>
        </div>
        <div class="card card--cream card--pad-xl">
            <table class="clay-table">
                <tr>
                    <th scope="row">신고 번호</th>
                    <td th:text="${reportInfoObject.reportId}"></td>
                </tr>
                <tr>
                    <th scope="row">신고 타입</th>
                    <td th:text="${reportInfoObject.type.getLabel()}"></td>
                </tr>
                <tr>
                    <th scope="row">닉네임</th>
                    <td th:text="${reportInfoObject.userNickName}"></td>
                </tr>
                <tr>
                    <th scope="row">신고내용</th>
                    <td th:text="(${reportInfoObject.contents})"></td>
                </tr>
                <tr>
                    <th scope="row">신고 회원 번호</th>
                    <td>
                        <a class="link" th:href="@{user/userInfo/{userId}(userId=${reportInfoObject.userId})}">
                            [[${reportInfoObject.userId}]]
                        </a>
                    </td>
                </tr>
                <tr>
                    <th scope="row">사진</th>
                    <td>
                        <img th:src="${reportInfoObject.imageUrl}" alt="no Img" style="border-radius:var(--r-md);">
                    </td>
                </tr>
            </table>
        </div>
        <div class="tabs">
            <form method="post" th:action="@{/report/{reportId}/confirm(reportId=${reportInfoObject.reportId}, userNickName=${reportInfoObject.userNickName}, type=${reportInfoObject.type.index})}">
                <button class="btn btn--primary">confirm</button>
            </form>
            <form method="post" th:action="@{/report/{reportId}/reject(reportId=${reportInfoObject.reportId})}">
                <button class="btn btn--secondary">reject</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
