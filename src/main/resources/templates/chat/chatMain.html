<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>채팅</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/clay.css">
    <style>
        .chat-shell {
            max-width: 720px;
            margin: var(--s-xl) auto var(--s-section);
            padding: 0 var(--s-lg);
        }
        .chat-panel {
            background: var(--surface-card);
            border-radius: var(--r-xl);
            border: 1px solid var(--hairline);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            display: flex;
            align-items: center;
            gap: var(--s-sm);
            padding: var(--s-md) var(--s-lg);
            background: var(--brand-lavender);
            color: var(--ink);
        }
        .chat-header .chat-header__emoji { font-size: 24px; line-height: 1; }
        .chat-header .chat-header__title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        #chatBox {
            height: 70vh;
            min-height: 420px;
            overflow-y: auto;
            padding: var(--s-lg);
            margin: 0;
            background: var(--canvas);
            display: flex;
            width: 100%;
            flex-direction: column-reverse; /* 최신 메시지를 위로 표시하기 위해 역순으로 정렬 */
            align-items: stretch;
            justify-content: flex-end; /* 메시지를 하단으로 정렬 */
        }
        .message-box {
            border-radius: var(--r-lg);
            padding: 10px 14px;
            margin-top: 6px;
            margin-bottom: 6px;
            max-width: 75%;
            display: inline-block;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.5;
            box-shadow: 0 1px 2px rgba(10,10,10,.06);
        }
        .message-box strong { font-weight: 600; }

        #inputContainer {
            display: flex;
            align-items: center;
            gap: var(--s-sm);
            padding: var(--s-md) var(--s-lg);
            background: var(--surface-soft);
            border-top: 1px solid var(--hairline);
            box-sizing: border-box;
        }

        #inputContainer input {
            height: 44px;
            flex: 1;
            padding: 0 16px;
            border-radius: var(--r-md);
            border: 1px solid var(--hairline);
            background: var(--canvas);
            color: var(--ink);
            font-size: 16px;
            font-family: inherit;
        }
        #inputContainer input:focus {
            outline: none;
            border-color: var(--ink);
            border-width: 1.5px;
        }

        #sendBtn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 44px;
            padding: 0 22px;
            border: 1px solid transparent;
            border-radius: var(--r-md);
            background: var(--brand-pink);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            transition: transform .08s ease, background .15s ease;
        }
        #sendBtn:hover { background: #e63e79; }
        #sendBtn:active { transform: translateY(1px); }

        .my-message-box {
            background-color: var(--brand-pink);
            color: #fff;
            margin-left: auto; /* 오른쪽으로 정렬 */
        }
        .my-message-box strong { color: #fff; }

        .other-message-box {
            background-color: var(--surface-card);
            color: var(--ink);
            margin-right: auto; /* 왼쪽으로 정렬 */
        }

        .join-message-box, .exit-message-box, .date-message-box {
            background-color: transparent;
            color: var(--muted);
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            box-shadow: none;
            max-width: none;
            align-self: center;
            margin: 10px auto; /* 중앙 정렬 */
        }
        .date-message-box {
            background-color: var(--surface-strong);
            border-radius: var(--r-pill);
            padding: 4px 14px;
        }

        .message-time {
            color: rgba(255,255,255,.75);
            font-size: 0.75em;
            margin-top: 4px;
        }
        .other-message-box .message-time { color: var(--muted); }

        /* 기타 스타일 유지 */
    </style>
</head>
<body>

<div class="chat-shell">
    <div id="chat" class="chat-panel">
        <div class="chat-header">
            <span class="chat-header__emoji">💬</span>
            <span class="chat-header__title">채팅</span>
        </div>
        <div id="chatBox"></div>
        <div id="inputContainer">
            <input id="message" placeholder="메시지를 입력하세요...">
            <button id="sendBtn">전송</button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    let username = /*[[${username}]]*/ null;
</script>

<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.1.5/sockjs.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
<script type="text/javascript">
    function getPotIdFromUrl() {
        let urlParts = window.location.pathname.split('/');
        return urlParts[urlParts.length - 2];
    }
    function sendChatRoomInfo(potId) {
        let message = {
            type: 'chatRoomInfo',
            potId: potId,
        };
        sock.send(JSON.stringify(message));
    }
    // startChat() 함수를 호출하기 위해 페이지 로드 이벤트를 감지
    window.addEventListener('DOMContentLoaded', function () {
        startChat();
        let potId = getPotIdFromUrl();
        if (potId) {
            sendChatRoomInfo(potId);
        }
    });

    let sock;
    let isSocketOpen = false;

    function connectSocket() {
        // username 변수를 사용하여 소켓 연결
        if (username != null && username !== "") {
            if (isSocketOpen) {
                // 이미 소켓이 연결되어 있는 경우에는 추가 연결 시도를 막음
                alert('이미 연결되어 있습니다.');
                return;
            }

            sock = new SockJS('/chat');
            sock.onopen = function () {
                isSocketOpen = true;
                sendJoinMessage();
            };

            sock.onmessage = function (e) {
                let message = JSON.parse(e.data);
                handleMessage(message);
            };

            sock.onclose = function () {
                isSocketOpen = false;
                sock.close();
            };
        } else {
            alert('사용자 이름을 입력하세요.');
        }
    }

    function startChat() {
        // document.getElementById('chatConnect').style.display = 'none';
        // document.getElementById('chat').removeAttribute('hidden');
        document.getElementById('chat').style.display = 'block'; // chat 요소 표시
        connectSocket();
    }

    function sendJoinMessage() {
        let message = {
            type: 'join',
            username: username,
        };
        sock.send(JSON.stringify(message));
    }

    function sendExitMessage() {
        let message = {
            type: 'exit',
            username: username,
        };
        sock.send(JSON.stringify(message));
    }

    function handleMessage(message) {
        let chatBox = document.getElementById('chatBox');
        let messageBox = document.createElement('div');
        messageBox.className = 'message-box';

        switch (message.type) {
            case 'join':
                messageBox.classList.add('join-message-box');
                messageBox.innerHTML = `<strong>${message.username}</strong> 님이 입장하셨습니다.`;
                break;
            case 'exit':
                messageBox.classList.add('exit-message-box');
                messageBox.innerHTML = `<strong>${message.username}</strong> 님이 퇴장하셨습니다.`;
                break;
            case 'chat':
                let currentDate = new Date().toLocaleDateString(); // 현재 날짜
                let time = new Date().toLocaleTimeString(); // 작성 시간
                messageBox.innerHTML = `<strong>${message.username}</strong>: ${message.text}`;
                let timeElement = document.createElement('div');
                timeElement.className = 'message-time';
                timeElement.textContent = time;

                // 날짜 메시지 생성
                let dateMessageBox = document.createElement('div');
                dateMessageBox.className = 'date-message-box';
                dateMessageBox.textContent = currentDate;

                messageBox.appendChild(timeElement);
                if (message.username === username) {
                    // 내가 보낸 메시지인 경우
                    messageBox.classList.add('my-message-box');
                } else {
                    // 다른 사람이 보낸 메시지인 경우
                    messageBox.classList.add('other-message-box');
                }

                // 이전 날짜 메시지 가져오기
                let prevDateElement = chatBox.querySelector('.date-message-box');
                if (!prevDateElement || prevDateElement.textContent !== currentDate) {
                    chatBox.insertBefore(dateMessageBox, chatBox.firstChild); // 날짜 메시지 추가
                }

                break;
            default:
                break;
        }

        chatBox.insertBefore(messageBox, chatBox.firstChild); // 가장 최근 메시지를 위에 추가
    }



    function sendMessage() {
        let input = document.getElementById('message');
        let text = input.value.trim();
        input.value = '';

        if (text !== '') {
            let potId = window.location.pathname.split('/')[2]; // 채팅방 URL에서 pot의 pk 값을 추출
            let message = {
                type: 'chat',
                username: username,
                text: text,
                potId: potId,
            };
            sock.send(JSON.stringify(message));
        }
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('message').addEventListener('keyup', function (e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });

    window.onbeforeunload = function() {
        if (isSocketOpen) {
            sendExitMessage();
        }
    };
</script>
</body>
</html>
