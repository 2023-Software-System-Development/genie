<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="icon" href="/image/logo/favicon-v5.png">
    <title>genie - OTT 팟 구하기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/clay.css">
</head>
<body>
<div th:include="/mainPage/navigator.html"></div>

<!-- 히어로: 메인(전체) 뷰에서만 표시. 특정 OTT 필터/검색 결과에서는 숨김 -->
<section class="container hero"
         th:if="${(potSearchForm.ottType == null or potSearchForm.ottType == 'all') and potSearchForm.searchText == null}">
    <div class="hero__grid">
        <div class="stack-lg">
            <span class="eyebrow">OTT 팟 구하기</span>
            <h1 class="display-xl">같이 보면<br>더 싸지니까</h1>
            <p class="lead">넷플릭스, 디즈니+, 왓챠, 웨이브.<br>믿을 수 있는 팟원과 구독료를 나눠요.</p>
            <div style="display:flex; gap:12px; flex-wrap:wrap;">
                <a class="btn btn--primary btn--lg" th:href="@{/pot}" sec:authorize="isAuthenticated()">팟 만들기</a>
                <a class="btn btn--primary btn--lg" th:href="@{/user/signup}" sec:authorize="isAnonymous()">무료로 시작하기</a>
                <a class="btn btn--secondary btn--lg" href="/pot/list?ottType=all">모집 중인 팟 보기</a>
            </div>
        </div>
        <div class="hero__art">
            <img class="logo-mark" src="/image/logo/genie-logo-mark-v5.svg" alt="genie">
        </div>
    </div>
</section>

<!-- 팟 목록 -->
<section class="section" style="padding-top:0;">
    <div th:include="/mainPage/pots_list.html"></div>

    <div class="container">
        <nav class="clay-pager" th:if="${potList.totalPages > 1}"
             th:with="start=${T(java.lang.Math).floor(potList.number/10)*10 + 1},
                      last=(${start + 9 < potList.totalPages ? start + 9 : potList.totalPages})">
            <a th:href="@{/pot/list(page=1)}">처음</a>
            <a th:classappend="${potList.first} ? 'is-disabled'"
               th:href="${potList.first} ? '#' : @{/pot/list(page=${potList.number})}">&lt;</a>
            <a class="page-link" th:each="page: ${#numbers.sequence(start, last)}"
               th:classappend="${page == potList.number + 1} ? 'is-active'"
               th:text="${page}" th:href="@{/pot/list(page=${page})}"></a>
            <a th:classappend="${potList.last} ? 'is-disabled'"
               th:href="${potList.last} ? '#' : @{/pot/list(page=${potList.number + 2})}">&gt;</a>
            <a th:href="@{/pot/list(page=${potList.totalPages})}">마지막</a>
        </nav>
    </div>
</section>

<!-- 푸터 (크림, 다크 아님) -->
<footer class="clay-footer">
    <div class="container">
        <div class="clay-footer__cols">
            <div>
                <div class="clay-footer__brand">
                    <img class="clay-footer__brand-mark" src="/image/logo/genie-logo-mark-v5.svg" alt="" aria-hidden="true">
                    genie
                </div>
                <p class="body-sm muted" style="margin-top:8px;">믿을 수 있는 OTT 팟 구하기</p>
            </div>
            <div>
                <h4>서비스</h4>
                <a href="/pot/list?ottType=all">팟 둘러보기</a>
                <a th:href="@{/pot}">팟 만들기</a>
                <a href="/user/info">마이페이지</a>
            </div>
            <div>
                <h4>OTT</h4>
                <a href="/pot/list?ottType=NetFlix">NETFLIX</a>
                <a href="/pot/list?ottType=DisneyPlus">Disney+</a>
                <a href="/pot/list?ottType=Watcha">WATCHA</a>
            </div>
            <div>
                <h4>고객</h4>
                <a href="/report">신고하기</a>
                <a href="/reliability">신뢰도</a>
            </div>
        </div>
    </div>
    <div class="clay-footer__mountain"></div>
</footer>
</body>
</html>
