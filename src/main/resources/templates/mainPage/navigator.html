<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
</head>
<body>
<!-- 디자인 시스템: 이 내비를 include 하는 모든 페이지에서 로드됨 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/clay.css">

<header class="clay-nav">
    <div class="clay-nav__inner">
        <a class="clay-nav__brand" href="/pot/list?ottType=all">
            <img class="clay-nav__logo" src="/image/logo/genie-logo-mark-v5.svg" alt="" aria-hidden="true"> genie
        </a>

        <nav class="clay-nav__menu">
            <a class="clay-nav__link" href="/pot/list?ottType=DisneyPlus">Disney+</a>
            <a class="clay-nav__link" href="/pot/list?ottType=NetFlix">NETFLIX</a>
            <a class="clay-nav__link" href="/pot/list?ottType=Watcha">WATCHA</a>
            <a class="clay-nav__link" href="/pot/list?ottType=Wavve">wavve</a>
            <a class="clay-nav__link" href="/user/info">마이페이지</a>
        </nav>

        <div class="clay-nav__actions">
            <form name="potSearchForm" action="/pot/list" class="clay-search" onsubmit="return handleFormSubmit()">
                <select name="searchType" class="clay-search__select">
                    <option value="potName">팟 이름</option>
                    <option value="remain">남은 인원</option>
                    <option value="term">기간</option>
                </select>
                <input name="searchText" class="clay-search__input" type="text" placeholder="검색">
                <button class="clay-search__btn" type="submit" aria-label="검색">🔍</button>
            </form>

            <form th:action="@{/user/login}" class="clay-nav__form">
                <button sec:authorize="isAnonymous()" class="btn btn--secondary" type="submit">로그인</button>
            </form>
            <form th:action="@{/user/signup}" class="clay-nav__form">
                <button sec:authorize="isAnonymous()" class="btn btn--primary" type="submit">회원가입</button>
            </form>
            <form th:action="@{/user/logout}" method="post" class="clay-nav__form">
                <button sec:authorize="isAuthenticated()" class="btn btn--secondary" type="submit">로그아웃</button>
            </form>
            <form th:action="@{/user/userList}" class="clay-nav__form">
                <button sec:authorize="hasRole('ADMIN')" class="btn btn--ghost" type="submit">관리자</button>
            </form>
        </div>
    </div>
</header>

<script th:inline="javascript">
    function handleFormSubmit() {
        var errorMessage = /*[[${errorMessage}]]*/ null;
        var searchType = document.forms["potSearchForm"]["searchType"].value;
        var searchText = document.forms["potSearchForm"]["searchText"].value;

        if (searchType === "remain" || searchType === "term") {
            if (!isNumeric(searchText)) {
                errorMessage = "숫자를 입력해주세요";
            }
        }
        if (errorMessage) {
            alert(errorMessage);
            return false;
        }
        return true;
    }

    function isNumeric(str) {
        if (str == null || str.length === 0) {
            return false;
        }
        return /^\d+$/.test(str);
    }
</script>
</body>
</html>
