<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/clay.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script>
        // CSRF 토큰을 모든 jQuery AJAX 요청 헤더에 자동 첨부
        $(function () {
            var token = $('meta[name="_csrf"]').attr('content');
            var header = $('meta[name="_csrf_header"]').attr('content');
            if (token && header) {
                $(document).ajaxSend(function (e, xhr) {
                    xhr.setRequestHeader(header, token);
                });
            }
        });

        function handleOuterClick(potId) {
            window.location.href = "/pot/" + potId;
        }

        function toggleLike(btn, potId) {
            if (btn.classList.contains('is-liked')) {
                btn.classList.remove('is-liked');
                deleteInterest(potId);
            } else {
                btn.classList.add('is-liked');
                saveInterest(potId);
            }
        }

        function saveInterest(potId) {
            $.ajax({ url: "/interest/save/" + potId, type: "POST" });
        }

        function deleteInterest(potId) {
            $.ajax({ url: "/interest/delete/" + potId, type: "DELETE" });
        }
    </script>
</head>
<body>
<div class="container">
    <th:block th:if="${potSearchForm.searchText!=null}">
        <h2 class="display-sm" style="margin-bottom:24px;" th:text="${potSearchForm.searchText} + ' 검색 결과'">검색 결과</h2>
    </th:block>

    <th:block th:if="${potList.getSize()==0 || potList == null}">
        <div class="card--cream card" style="text-align:center;padding:64px;">
            <div style="font-size:48px;">🪔</div>
            <p class="title-md" style="margin-top:12px;">아직 모집 중인 팟이 없어요</p>
            <p class="body-sm muted">첫 번째 팟을 만들어 보세요.</p>
        </div>
    </th:block>

    <div class="grid grid--4">
        <div th:each="pot, stat : ${potList}" class="pot-card"
             th:classappend="'pot-card--c' + ${stat.index % 5}"
             th:onclick="'handleOuterClick(' + ${pot.potId} + ')'">

            <button type="button" sec:authorize="isAuthenticated()" class="like-btn"
                    th:classappend="${pot.wish} ? 'is-liked' : ''"
                    th:onclick="'event.stopPropagation();toggleLike(this,' + ${pot.potId} + ')'"></button>

            <div class="pot-card__top">
                <span class="pot-card__ott" th:text="${pot.ottType}">OTT</span>
            </div>
            <h3 class="pot-card__name" th:text="${pot.potName}">팟 이름</h3>
            <div class="pot-card__meta">
                <span>모집 <b th:text="${pot.recruit}">4</b></span>
                <span>현재 <b th:text="${pot.recruit - pot.remain}">2</b></span>
                <span>기간 <b th:text="|${pot.term}개월|">3개월</b></span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
