<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>찜한 팟 - genie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/clay.css">
    <script>
        function handleOuterClick(potId) {
            window.location.href = "/pot/" + potId;
        }
    </script>
</head>
<body>
<div th:include="/mainPage/navigator.html"></div>
<div th:fragment="content" th:remove="tag">
    <div class="container section">
        <div class="stack-lg" style="margin-bottom:var(--s-lg);">
            <p class="eyebrow">💜 MY WISHLIST</p>
            <h1 class="display-sm">찜한 팟</h1>
        </div>
        <div class="grid" style="grid-template-columns:280px 1fr;align-items:start;">
            <!-- 왼쪽: mypage_menu.html -->
            <div th:include="/myPage/mypage_menu.html"></div>
            <!-- 오른쪽: 찜한 팟 목록 -->
            <div class="stack-lg">
                <div th:if="${interestPotList.totalElements == 0}" class="card card--cream"
                     style="text-align:center;padding:64px;">
                    <div style="font-size:48px;">💜</div>
                    <p class="title-md" style="margin-top:12px;">아직 찜한 팟이 없어요</p>
                    <p class="body-sm muted">마음에 드는 팟을 찜해보세요.</p>
                </div>

                <div class="grid grid--2">
                    <div th:each="pot, stat : ${interestPotList}" class="pot-card"
                         th:classappend="'pot-card--c' + ${stat.index % 5}"
                         th:onclick="'handleOuterClick(\'' + ${pot.potId} + '\')'">
                        <div class="pot-card__top">
                            <span class="pot-card__ott" th:text="${pot.ottType}">OTT</span>
                        </div>
                        <h3 class="pot-card__name" th:text="${pot.potName}">팟 이름</h3>
                        <div class="pot-card__meta">
                            <span>모집 <b th:text="${pot.recruit}">4</b></span>
                            <span>현재 <b th:text="${pot.recruit - pot.remain}">2</b></span>
                            <span>기간 <b th:text="|${pot.term}개월|">3개월</b></span>
                        </div>
                    </div>
                </div>

                <nav class="clay-pager" th:if="${interestPotList.totalPages > 1}"
                     th:with="start=${T(java.lang.Math).floor(interestPotList.number/10)*10 + 1}, last=(${start + 9 < interestPotList.totalPages ? start + 9 : interestPotList.totalPages})">
                    <span th:if="${interestPotList.first}" class="is-disabled">&lt;</span>
                    <a th:unless="${interestPotList.first}"
                       th:href="@{/user/interestList(page=${interestPotList.number})}" aria-label="Previous">&lt;</a>

                    <a th:each="page: ${#numbers.sequence(start, last)}"
                       th:classappend="${page == interestPotList.number + 1} ? 'is-active'"
                       th:text="${page}" th:href="@{/user/interestList(page=${page})}">1</a>

                    <span th:if="${interestPotList.last}" class="is-disabled">&gt;</span>
                    <a th:unless="${interestPotList.last}"
                       th:href="@{/user/interestList(page=${interestPotList.number + 2})}" aria-label="Next">&gt;</a>
                </nav>
            </div>
        </div>
    </div>
</div>
</body>
</html>
