<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script>
        function OuterClick(potId) {
            window.location.href = "/reliability";
        }
    </script>
</head>
<body>
<div class="stack-lg">
    <!-- 신뢰도 카드 -->
    <div class="feature-card feature-card--lavender" th:onclick="'OuterClick()'"
         style="flex-direction:row;align-items:center;justify-content:space-between;min-height:auto;cursor:pointer;">
        <div style="display:flex;align-items:center;gap:var(--s-sm);">
            <span class="fc-emoji" style="font-size:26px;">⭐</span>
            <span class="title-lg">신뢰도</span>
        </div>
        <span class="title-lg" style="font-weight:700;" th:text="${user.reliabilityScore}">0</span>
    </div>

    <!-- 내 정보 -->
    <div class="card card--cream card--pad-xl">
        <p class="eyebrow" style="margin-bottom:var(--s-md);">🧞 내 정보</p>
        <table class="clay-table">
            <tr>
                <th scope="row">아이디</th>
                <td th:text="${user.userLoginId}"></td>
            </tr>
            <tr>
                <th scope="row">이름</th>
                <td th:text="${user.userName}"></td>
            </tr>
            <tr>
                <th scope="row">닉네임</th>
                <td th:text="${user.userNickName}"></td>
            </tr>
            <tr>
                <th scope="row">전화번호</th>
                <td th:text="${user.phoneNumber}"></td>
            </tr>
            <tr>
                <th scope="row">이메일 주소</th>
                <td th:text="${user.email}"></td>
            </tr>
        </table>
    </div>
</div>
</body>
</html>
