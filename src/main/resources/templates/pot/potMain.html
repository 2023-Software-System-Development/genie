<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/image/logo/favicon-v5.png">
    <title>팟 메인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/clay.css">
</head>
<body>
<div th:include="/mainPage/navigator.html"></div>

<script>
    function redirectToChat(potId) {
        window.location.href = "/pot/" + potId +"/chat";
    }
    function redirectToDelete(potId) {
        window.location.href = "/pot/delete?potId=" + potId;
    }
    function redirectToApply(potId) {
        window.location.href = "/pot/apply?potId=" + potId;
    }
    function redirectToStart(potId) {
        window.location.href = "/pot/" + potId + "/start";
    }
</script>

<div class="container section">
    <div style="max-width:640px;margin:0 auto;" class="stack-lg">
        <div th:label="pot" class="card card--pad-xl">
            <div class="stack-sm" style="margin-bottom:var(--s-md);">
                <span class="eyebrow">📺 POT MAIN</span>
                <h1 class="display-sm" th:text="${pot.potName}"></h1>
            </div>
            <table class="clay-table">
                <tr>
                    <th scope="row">팟 이름</th>
                    <td th:text="${pot.potName}"></td>
                </tr>
                <tr>
                    <th scope="row">OTT 종류</th>
                    <td th:text="${pot.ottType}"></td>
                </tr>
                <tr>
                    <th scope="row">가격</th>
                    <td th:text="${pot.price}"></td>
                </tr>
                <tr>
                    <th scope="row">모집인원</th>
                    <td th:text="${pot.recruit}"></td>
                </tr>
                <tr>
                    <th scope="row">시작일</th>
                    <td th:text="${pot.startDate}"></td>
                </tr>
                <tr>
                    <th scope="row">종료일</th>
                    <td th:text="${pot.endDate}"></td>
                </tr>
                <tr>
                    <th scope="row">OTT id</th>
                    <td th:text="${pot.ottId}"></td>
                </tr>
                <tr>
                    <th scope="row">OTT pwd</th>
                    <td th:text="${pot.ottPw}"></td>
                </tr>
                <tr>
                    <th scope="row">팟장 이름</th>
                    <td th:text="${pot.masterName}"></td>
                </tr>
            </table>
        </div>

        <div class="center" style="display:flex;gap:var(--s-sm);justify-content:center;flex-wrap:wrap;">
            <button th:if="${pot.isMaster}" th:onclick="'redirectToEdit(' + ${pot.potId} + ')'" type="button" class="btn btn--secondary">수정하기</button>
            <button th:onclick="'redirectToChat(' + ${pot.potId} + ')'" type="button" class="btn btn--primary">채팅하기</button>
        </div>
    </div>
</div>
</body>
</html>
