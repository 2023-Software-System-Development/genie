<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/image/logo/favicon-v5.png">
    <title>신뢰도 이력</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/clay.css">
</head>
<body>
<div th:include="/main/navigator.html"></div>
<div th:fragment="content" th:remove="tag">
    <div class="container section">
        <div class="grid" style="grid-template-columns:280px 1fr;align-items:start;">
            <aside>
                <div th:include="/mypage/mypage_menu.html"></div>
            </aside>
            <main class="stack-lg">
                <div class="stack-sm">
                    <p class="eyebrow">My Page</p>
                    <h1 class="display-sm">⭐ 신뢰도 이력</h1>
                    <p class="lead muted">활동에 따라 쌓인 신뢰도 점수 변동 내역이에요.</p>
                </div>

                <div class="card card--pad-xl" style="overflow-x:auto;">
                    <table class="clay-table">
                        <thead>
                        <tr>
                            <th scope="col">내역 (History)</th>
                            <th scope="col" style="text-align:right;">점수 (Score)</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="reliability, stat : ${reliabilityList}">
                            <td th:text="${reliability.history}"></td>
                            <td style="text-align:right;font-weight:600;color:var(--ink);" th:text="${reliability.score}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>
</div>
</body>
</html>
