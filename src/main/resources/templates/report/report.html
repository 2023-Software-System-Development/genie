<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns="http://www.w3.org/1999/html">
<head>
  <meta charset="UTF-8">
    <link rel="icon" href="/image/logo/favicon-v5.png">
  <title>회원 신고 - genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/clay.css">
</head>
<body>
<div th:include="/main/navigator.html"></div>
<th:block th:if="${success != null && success}">
  <script>alert('신고가 정상적으로 접수되었습니다.')</script>
</th:block>

<div class="container section">
  <div style="max-width:560px;margin:0 auto;" class="stack-lg">
    <div class="stack-sm center">
      <span class="eyebrow">🚨 REPORT</span>
      <h1 class="display-sm">회원 신고</h1>
      <p class="lead muted">팟에서 문제가 있었던 회원을 신고해주세요</p>
    </div>

    <form class="card card--pad-xl stack-lg" th:action="@{/report}" th:object="${reportForm}" method="post" enctype="multipart/form-data">
      <div class="field">
        <label for="userNickname">회원 닉네임</label>
        <input type="text" id="userNickname" th:field="*{userNickName}" class="input" placeholder="신고할 회원 닉네임을 입력하세요">
        <p class="field-error" th:if="${#fields.hasErrors('userNickName')}" th:errors="*{userNickName}"></p>
      </div>

      <div class="field">
        <label>사유</label>
        <div class="stack-sm">
          <label th:each="type : ${T(com.example.genie.domain.report.dto.Type).values()}" class="body-md"
                 style="display:flex;align-items:center;gap:var(--s-xs);font-weight:400;">
            <input type="radio" th:field="*{type}" th:value="${type.getIndex()}">
            <span th:text="${type.label}">사유</span>
          </label>
        </div>
      </div>

      <div class="field">
        <label for="contents">내용</label>
        <textarea id="contents" th:field="*{contents}" class="input" placeholder="신고할 내용을 입력하세요"></textarea>
        <p class="field-error" th:if="${#fields.hasErrors('contents')}" th:errors="*{contents}"></p>
      </div>

      <div class="field">
        <label for="image">증거 자료</label>
        <input type="file" id="image" th:field="*{image}" class="input">
      </div>

      <div style="display:flex;gap:var(--s-sm);justify-content:flex-end;">
        <button type="button" class="btn btn--secondary">취소</button>
        <button type="submit" class="btn btn--primary">신고하기</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
