<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns="http://www.w3.org/1999/html">
<head>
  <meta charset="UTF-8">
  <title>회원 조회</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/clay.css">
</head>
<body>
<div th:include="/system/systemNav.html"></div>
<div class="container section">
  <div class="stack-lg" style="max-width:640px;margin:0 auto;">
    <div class="stack-sm">
      <p class="eyebrow">🧞 genie 관리자</p>
      <h1 class="display-sm">회원 조회</h1>
    </div>
    <div class="card card--cream card--pad-xl">
      <table class="clay-table">
        <tr>
          <th scope="row">회원 번호</th>
          <td th:text="${user.id}"></td>
        </tr>
        <tr>
          <th scope="row">권한</th>
          <td th:text="${user.role}"></td>
        </tr>
        <tr>
          <th scope="row">아이디</th>
          <td th:text="${user.userLoginId}"></td>
        </tr>
        <tr>
          <th scope="row">이름</th>
          <td th:text="${user.userName}"></td>
        </tr>
        <tr>
          <th scope="row">닉네임</th>
          <td th:text="(${user.userNickName})"></td>
        </tr>
        <tr>
          <th scope="row">전화번호</th>
          <td th:text="${user.phoneNumber}"></td>
        </tr>
        <tr>
          <th scope="row">이메일</th>
          <td><a class="link" th:href="@{mailTo:{email}(email=${user.email})}">[[${user.email}]]</a></td>
        </tr>
        <tr>
          <th scope="row">신뢰도</th>
          <td th:text="${user.reliabilityScore}"></td>
        </tr>
      </table>
    </div>
    <div th:if="${!user.role.equals('ADMIN')}">
      <form th:action="@{/user/addRole(userId = ${userId})}" method="post">
        <button class="btn btn--primary">관리자로 임명</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
