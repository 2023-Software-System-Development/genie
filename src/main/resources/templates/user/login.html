<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>로그인 - genie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/clay.css">
</head>
<body>
<th:block th:if="${param.req}">
    <script>alert('로그인 후 이용 가능한 서비스입니다.');</script>
</th:block>
<div th:include="/mainPage/navigator.html"></div>

<div class="auth-wrap">
    <div class="auth-card stack-lg">
        <div class="stack-sm">
            <h1 class="display-sm">다시 오셨네요 🧞</h1>
            <p class="body-sm muted">genie 계정으로 로그인하세요.</p>
        </div>
        <form th:action="@{/loginProc}" method="post" class="stack-md">
            <div class="field">
                <label for="userLoginId">아이디</label>
                <input class="input" type="text" id="userLoginId" name="userLoginId" placeholder="아이디를 입력하세요">
            </div>
            <div class="field">
                <label for="userPw">비밀번호</label>
                <input class="input" type="password" id="userPw" name="userPw" placeholder="비밀번호를 입력하세요">
            </div>
            <div th:if="${param.error}" class="alert alert--error" th:text="${param.exception}">잘못된 아이디나 암호입니다</div>
            <button type="submit" class="btn btn--primary btn--block btn--lg">로그인</button>
        </form>
        <p class="body-sm center muted">계정이 없으신가요? <a class="link" href="/user/signup">회원가입</a></p>
    </div>
</div>
</body>
</html>
